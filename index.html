
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
#quiz-app { padding: 1rem; max-width: 760px; margin: auto; }
.screen { display: none; }
.screen.active { display: block; }
.topic-btn {
  display: inline-block; padding: 6px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 500; cursor: pointer; border: 0.5px solid;
  margin: 4px; transition: all 0.15s;
}
.topic-btn.active { color: white !important; }
.tb-all { border-color: #888; color: #555; }
.tb-all.active { background: #555; }
.tb-ioc { border-color: #534AB7; color: #534AB7; }
.tb-ioc.active { background: #534AB7; }
.tb-jdbc { border-color: #0F6E56; color: #0F6E56; }
.tb-jdbc.active { background: #0F6E56; }
.tb-boot { border-color: #185FA5; color: #185FA5; }
.tb-boot.active { background: #185FA5; }
.tb-ms { border-color: #BA7517; color: #BA7517; }
.tb-ms.active { background: #BA7517; }
.start-card {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 2rem;
  text-align: center;
}
.stat-row { display: flex; gap: 12px; justify-content: center; margin: 1.5rem 0; flex-wrap: wrap; }
.stat-box {
  background: var(--color-background-secondary);
  border-radius: var(--border-radius-md);
  padding: 12px 20px;
  min-width: 90px;
}
.stat-num { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.stat-lbl { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
.progress-bar-bg {
  background: var(--color-background-secondary);
  border-radius: 4px; height: 6px; margin: 1rem 0;
}
.progress-bar-fill {
  background: #534AB7; height: 6px; border-radius: 4px;
  transition: width 0.3s;
}
.q-card {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 1.5rem;
  margin-bottom: 1rem;
}
.q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
.q-topic-badge {
  font-size: 11px; font-weight: 500; padding: 3px 10px;
  border-radius: 12px;
}
.badge-ioc { background: #EEEDFE; color: #3C3489; }
.badge-jdbc { background: #E1F5EE; color: #085041; }
.badge-boot { background: #E6F1FB; color: #0C447C; }
.badge-ms { background: #FAEEDA; color: #633806; }
.q-num { font-size: 13px; color: var(--color-text-secondary); }
.q-text { font-size: 16px; color: var(--color-text-primary); line-height: 1.5; margin-bottom: 1.25rem; }
.opt-btn {
  width: 100%; text-align: left; padding: 12px 16px;
  border: 0.5px solid var(--color-border-secondary);
  border-radius: var(--border-radius-md);
  background: var(--color-background-primary);
  color: var(--color-text-primary);
  font-size: 14px; cursor: pointer;
  margin-bottom: 8px; transition: all 0.15s;
  line-height: 1.4;
}
.opt-btn:hover:not(:disabled) { background: var(--color-background-secondary); }
.opt-btn.correct { background: #EAF3DE; border-color: #639922; color: #27500A; }
.opt-btn.wrong { background: #FCEBEB; border-color: #E24B4A; color: #501313; }
.opt-btn.reveal { background: #EAF3DE; border-color: #639922; color: #27500A; }
.opt-btn:disabled { cursor: default; }
.nav-row { display: flex; gap: 10px; justify-content: space-between; align-items: center; margin-top: 1rem; }
.btn-primary {
  background: #534AB7; color: white; border: none;
  padding: 10px 24px; border-radius: var(--border-radius-md);
  font-size: 14px; cursor: pointer; font-weight: 500;
}
.btn-primary:hover { background: #3C3489; }
.btn-secondary {
  background: transparent; color: var(--color-text-secondary);
  border: 0.5px solid var(--color-border-secondary);
  padding: 10px 20px; border-radius: var(--border-radius-md);
  font-size: 14px; cursor: pointer;
}
.btn-secondary:hover { background: var(--color-background-secondary); }
.feedback { font-size: 13px; color: var(--color-text-secondary); font-style: italic; margin-top: 8px; }
.result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin: 1.5rem 0; }
.result-box {
  background: var(--color-background-secondary);
  border-radius: var(--border-radius-md);
  padding: 14px; text-align: center;
}
.result-big { font-size: 28px; font-weight: 500; }
.result-lbl { font-size: 12px; color: var(--color-text-secondary); margin-top: 4px; }
.score-ring { width: 100px; height: 100px; margin: 0 auto 1.5rem; }
.h1 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 0.5rem; }
.sub { font-size: 14px; color: var(--color-text-secondary); }
.q-skip { font-size: 13px; color: var(--color-text-secondary); cursor: pointer; }
.q-skip:hover { color: var(--color-text-primary); }
.btn-top-end { padding: 6px 12px; font-size: 12px; }

@media (max-width: 768px) {
  #quiz-app { padding: 0.75rem; }
  .start-card, .q-card { padding: 1rem; border-radius: 12px; }
  .h1 { font-size: 20px; }
  .q-text { font-size: 15px; }
  .score-ring { width: 88px; height: 88px; margin-bottom: 1rem; }
  .result-big { font-size: 24px; }
  .stat-row { gap: 8px; margin: 1rem 0; }
  .stat-box { flex: 1 1 calc(50% - 8px); min-width: 0; padding: 10px 12px; }
  .topic-btn { font-size: 11px; padding: 6px 10px; }
  #screen-start input[type="range"] { width: 100% !important; }
  #screen-start [id="q-limit-out"] { display: inline-block; margin-top: 8px; margin-left: 0 !important; }
  .nav-row { flex-wrap: wrap; }
  .nav-row .btn-primary, .nav-row .btn-secondary { width: 100%; }
}

@media (max-width: 480px) {
  #quiz-app { padding: 0.5rem; }
  .start-card, .q-card { padding: 0.875rem; }
  .q-meta { align-items: flex-start; }
  .q-topic-badge, .q-num { font-size: 11px; }
  .opt-btn { padding: 10px 12px; font-size: 13px; }
  .btn-primary, .btn-secondary { padding: 10px 14px; font-size: 13px; }
  .result-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
</style>

<div id="quiz-app">

<div id="screen-start" class="screen active">
  <div class="start-card">
    <div class="h1">Spring & Microservices Quiz</div>
    <p class="sub" style="margin-bottom:1.5rem">125 questions across 4 topics</p>

    <div style="margin-bottom:1.5rem">
      <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:8px">Filter by topic</div>
      <span class="topic-btn tb-all active" onclick="setTopic('all',this)">All Topics</span>
      <span class="topic-btn tb-ioc" onclick="setTopic('ioc',this)">IoC & Beans</span>
      <span class="topic-btn tb-jdbc" onclick="setTopic('jdbc',this)">Spring JDBC</span>
      <span class="topic-btn tb-boot" onclick="setTopic('boot',this)">Spring Boot</span>
      <span class="topic-btn tb-ms" onclick="setTopic('ms',this)">Microservices</span>
    </div>

    <div class="stat-row">
      <div class="stat-box"><div class="stat-num" id="q-count">125</div><div class="stat-lbl">Questions</div></div>
      <div class="stat-box"><div class="stat-num">4</div><div class="stat-lbl">Topics</div></div>
      <div class="stat-box"><div class="stat-num">4</div><div class="stat-lbl">Options each</div></div>
    </div>

    <div style="margin-bottom:1.5rem">
      <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:8px">Number of questions</div>
      <input type="range" min="5" max="125" value="125" id="q-limit" oninput="document.getElementById('q-limit-out').textContent=this.value;document.getElementById('q-count').textContent=this.value" style="width:70%">
      <span id="q-limit-out" style="font-size:14px;font-weight:500;margin-left:8px">125</span>
    </div>

    <button class="btn-primary" onclick="startQuiz()" style="padding:12px 36px;font-size:15px">Start Quiz</button>
  </div>
</div>

<div id="screen-quiz" class="screen">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;flex-wrap:wrap;gap:8px">
    <span id="prog-text" style="font-size:13px;color:var(--color-text-secondary)"></span>
    <div style="display:flex;gap:16px;font-size:13px">
      <span style="color:#639922">✓ <span id="live-correct">0</span></span>
      <span style="color:#E24B4A">✗ <span id="live-wrong">0</span></span>
      <span class="q-skip" onclick="skipQ()">Skip →</span>
      <button class="btn-secondary btn-top-end" onclick="endQuiz()">End Quiz</button>
    </div>
  </div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>

  <div class="q-card">
    <div class="q-meta">
      <span class="q-topic-badge" id="q-badge"></span>
      <span class="q-num" id="q-num-label"></span>
    </div>
    <div class="q-text" id="q-text"></div>
    <div id="options-container"></div>
    <div class="feedback" id="feedback" style="display:none"></div>
  </div>

  <div class="nav-row">
    <button class="btn-primary" id="next-btn" onclick="nextQ()" style="display:none">Next →</button>
  </div>
</div>

<div id="screen-result" class="screen">
  <div class="start-card">
    <svg class="score-ring" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="42" fill="none" stroke="var(--color-background-secondary)" stroke-width="10"/>
      <circle cx="50" cy="50" r="42" fill="none" stroke="#534AB7" stroke-width="10"
        stroke-dasharray="263.9" stroke-dashoffset="263.9"
        id="ring-circle" stroke-linecap="round"
        transform="rotate(-90 50 50)"/>
      <text x="50" y="55" text-anchor="middle" font-size="18" font-weight="500" fill="var(--color-text-primary)" id="ring-pct">0%</text>
    </svg>

    <div class="h1" id="result-title">Quiz Complete!</div>
    <p class="sub" id="result-sub" style="margin-bottom:1.5rem"></p>

    <div class="result-grid">
      <div class="result-box"><div class="result-big" id="res-correct" style="color:#639922">0</div><div class="result-lbl">Correct</div></div>
      <div class="result-box"><div class="result-big" id="res-wrong" style="color:#E24B4A">0</div><div class="result-lbl">Wrong</div></div>
      <div class="result-box"><div class="result-big" id="res-skip" style="color:var(--color-text-secondary)">0</div><div class="result-lbl">Skipped</div></div>
      <div class="result-box"><div class="result-big" id="res-total">0</div><div class="result-lbl">Total</div></div>
    </div>

    <div id="topic-breakdown" style="margin-bottom:1.5rem;text-align:left"></div>

    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn-secondary" onclick="showStart()">← Back</button>
      <button class="btn-primary" onclick="startQuiz()">Retry</button>
    </div>
  </div>
</div>

</div>

<script>
if (!document.querySelector('meta[name="viewport"]')) {
  const viewportMeta = document.createElement('meta');
  viewportMeta.name = 'viewport';
  viewportMeta.content = 'width=device-width, initial-scale=1';
  document.head.appendChild(viewportMeta);
}

const TOPIC_CONFIG = {
  ioc:  {label:'IoC & Beans',    badge:'badge-ioc',  cls:'tb-ioc'},
  jdbc: {label:'Spring JDBC',    badge:'badge-jdbc',  cls:'tb-jdbc'},
  boot: {label:'Spring Boot',    badge:'badge-boot',  cls:'tb-boot'},
  ms:   {label:'Microservices',  badge:'badge-ms',    cls:'tb-ms'},
};

let selectedTopic = 'all';
let questions = [];
let currentIdx = 0;
let correct = 0;
let wrong = 0;
let skipped = 0;
let answered = false;
let topicStats = {};

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function setTopic(t, el) {
  selectedTopic = t;
  document.querySelectorAll('.topic-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const pool = t==='all' ? ALL_QUESTIONS : ALL_QUESTIONS.filter(q=>q.topic===t);
  const lim = parseInt(document.getElementById('q-limit').max);
  const newMax = pool.length;
  const qLimitEl = document.getElementById('q-limit');
  qLimitEl.max = newMax;
  qLimitEl.value = Math.min(parseInt(qLimitEl.value)||newMax, newMax);
  document.getElementById('q-limit-out').textContent = qLimitEl.value;
  document.getElementById('q-count').textContent = qLimitEl.value;
}

function startQuiz() {
  const pool = selectedTopic==='all' ? ALL_QUESTIONS : ALL_QUESTIONS.filter(q=>q.topic===selectedTopic);
  const limit = parseInt(document.getElementById('q-limit').value);
  questions = shuffle([...pool]).slice(0, limit);
  currentIdx = 0; correct = 0; wrong = 0; skipped = 0;
  topicStats = {};
  questions.forEach(q=>{
    if(!topicStats[q.topic]) topicStats[q.topic]={c:0,w:0,s:0};
  });
  showScreen('screen-quiz');
  renderQ();
}

function renderQ() {
  if(currentIdx >= questions.length){showResult();return;}
  answered = false;
  const q = questions[currentIdx];
  const tc = TOPIC_CONFIG[q.topic];
  document.getElementById('prog-text').textContent = `Question ${currentIdx+1} of ${questions.length}`;
  document.getElementById('prog-fill').style.width = ((currentIdx/questions.length)*100)+'%';
  document.getElementById('live-correct').textContent = correct;
  document.getElementById('live-wrong').textContent = wrong;
  document.getElementById('q-badge').textContent = tc.label;
  document.getElementById('q-badge').className = 'q-topic-badge '+tc.badge;
  document.getElementById('q-num-label').textContent = '#'+(currentIdx+1);
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';

  const opts = shuffle([...q.opts]);
  const container = document.getElementById('options-container');
  container.innerHTML = '';
  opts.forEach(opt=>{
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = ()=>selectAnswer(opt, q.a, btn);
    container.appendChild(btn);
  });
}

function selectAnswer(chosen, correct_ans, btn) {
  if(answered) return;
  answered = true;
  const allBtns = document.querySelectorAll('.opt-btn');
  allBtns.forEach(b=>{
    b.disabled = true;
    if(b.textContent===correct_ans) b.classList.add('correct');
  });
  if(chosen===correct_ans){
    correct++;
    topicStats[questions[currentIdx].topic].c++;
    document.getElementById('feedback').textContent = '✓ Correct!';
    document.getElementById('feedback').style.color='#27500A';
  } else {
    btn.classList.add('wrong');
    wrong++;
    topicStats[questions[currentIdx].topic].w++;
    document.getElementById('feedback').textContent = '✗ Incorrect. The correct answer is highlighted.';
    document.getElementById('feedback').style.color='#501313';
  }
  document.getElementById('feedback').style.display='block';
  document.getElementById('live-correct').textContent=correct;
  document.getElementById('live-wrong').textContent=wrong;
  document.getElementById('next-btn').style.display='inline-block';
}

function skipQ() {
  if(answered) return;
  skipped++;
  topicStats[questions[currentIdx].topic].s++;
  currentIdx++;
  renderQ();
}

function nextQ() {
  currentIdx++;
  renderQ();
}

function endQuiz() {
  skipped += questions.length - currentIdx;
  showResult();
}

function showResult() {
  showScreen('screen-result');
  const total = correct + wrong + skipped;
  const pct = total>0 ? Math.round((correct/total)*100) : 0;
  document.getElementById('res-correct').textContent = correct;
  document.getElementById('res-wrong').textContent = wrong;
  document.getElementById('res-skip').textContent = skipped;
  document.getElementById('res-total').textContent = total;

  const circumference = 263.9;
  const offset = circumference - (pct/100)*circumference;
  document.getElementById('ring-circle').style.strokeDashoffset = offset;
  document.getElementById('ring-pct').textContent = pct+'%';

  let title='', sub='';
  if(pct>=90){title='Excellent!';sub='Outstanding performance!';}
  else if(pct>=75){title='Great Job!';sub='You have a solid understanding.';}
  else if(pct>=60){title='Good Effort!';sub='A bit more review will help.';}
  else if(pct>=40){title='Keep Practicing!';sub='Review the topics and try again.';}
  else{title='Keep Going!';sub='Study the material and retry.';}
  document.getElementById('result-title').textContent=title;
  document.getElementById('result-sub').textContent=sub;

  let breakdown='<div style="font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px">Topic Breakdown</div>';
  Object.entries(topicStats).forEach(([topic, s])=>{
    const tc=TOPIC_CONFIG[topic];
    const t=s.c+s.w+s.s;
    if(t===0)return;
    const p=Math.round((s.c/t)*100);
    breakdown+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span class="q-topic-badge ${tc.badge}" style="min-width:110px">${tc.label}</span>
      <div style="flex:1;background:var(--color-background-secondary);border-radius:4px;height:6px">
        <div style="width:${p}%;background:#534AB7;height:6px;border-radius:4px"></div>
      </div>
      <span style="font-size:12px;color:var(--color-text-secondary);min-width:50px">${s.c}/${t} (${p}%)</span>
    </div>`;
  });
  document.getElementById('topic-breakdown').innerHTML=breakdown;
}

function showStart(){showScreen('screen-start');}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
